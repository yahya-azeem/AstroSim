name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@wasm-bindgen-cli

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM Library
        run: |
          mkdir -p lib
          echo "" > empty.c
          clang --target=wasm32-unknown-unknown -c empty.c -o empty.o
          ar rcs lib/libstdc++.a empty.o
          export CFLAGS="-I$EMSDK/upstream/emscripten/cache/sysroot/include"
          export CXXFLAGS="-I$EMSDK/upstream/emscripten/cache/sysroot/include -I$EMSDK/upstream/emscripten/cache/sysroot/include/c++/v1"
          export RUSTFLAGS="-L $EMSDK/upstream/emscripten/cache/sysroot/lib/wasm32-emscripten/ -C link-arg=-lc -L ./lib"
          cargo build --lib --target wasm32-unknown-unknown --release

      - name: Run wasm-bindgen
        run: wasm-bindgen --target web --out-dir pkg target/wasm32-unknown-unknown/release/AstroSim.wasm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Deployment Directory
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r pkg dist/

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
