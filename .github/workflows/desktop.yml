name: Desktop Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: AstroSim-linux.zip
            binary_path: target/release/AstroSim
          - os: windows-latest
            artifact_name: AstroSim-windows.zip
            binary_path: target/release/AstroSim.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libvulkan-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Binary
        run: cargo build --bin AstroSim --release

      - name: Package Asset (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          zip -j ${{ matrix.artifact_name }} ${{ matrix.binary_path }}

      - name: Package Asset (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path ${{ matrix.binary_path }} -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: AstroSim-linux.zip

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: AstroSim-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          prerelease: ${{ github.ref_type != 'tag' }}
          files: |
            AstroSim-linux.zip
            AstroSim-windows.zip
          draft: false
          generate_release_notes: true
