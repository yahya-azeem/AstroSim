name: Desktop Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Linux Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libvulkan-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Binary
        run: cargo build --bin AstroSim --release

      - name: Package Asset
        run: |
          zip -j AstroSim-linux.zip target/release/AstroSim

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstroSim-linux.zip
          path: AstroSim-linux.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: AstroSim-linux.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          prerelease: ${{ github.ref_type != 'tag' }}
          files: |
            AstroSim-linux.zip
          draft: false
          generate_release_notes: true
